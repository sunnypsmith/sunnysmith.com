<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SECTOR NOT FOUND — Sunny P Smith</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --glow: #c8102e;
      --glow-dim: rgba(200, 16, 46, 0.4);
      --amber: #ff8c00;
      --green: #00ff41;
      --bg: #050508;
      --border: rgba(200, 16, 46, 0.15);
    }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
      96% { opacity: 0.9; }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    html { height: 100%; }
    body {
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      background: var(--bg);
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: flicker 8s infinite;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none;
      z-index: 1000;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 8px;
      background: linear-gradient(180deg, transparent, rgba(200,16,46,0.08), transparent);
      animation: scanline 6s linear infinite;
      pointer-events: none;
      z-index: 1001;
    }
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 1;
    }
    .core {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 900;
      color: var(--glow);
      text-shadow: 0 0 40px var(--glow-dim), 0 0 80px rgba(200,16,46,0.15);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-msg {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.5rem;
    }
    .error-detail {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.15em;
      margin-bottom: 2.5rem;
    }
    .error-detail .blink {
      animation: blink 1s step-end infinite;
      color: var(--glow);
    }
    .return-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 2rem;
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    .return-btn:hover {
      border-color: var(--glow);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="vignette"></div>
  <div class="core">
    <div class="error-code">404</div>
    <div class="error-msg">Sector Not Found</div>
    <div class="error-detail">&gt; REQUESTED MEMORY ADDRESS DOES NOT EXIST <span class="blink">█</span></div>
    <a href="/" class="return-btn">← Return to Mainframe</a>
  </div>
</body>
</html>
